<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Tracker - Futuristic Matrix Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Matrix Background Canvas -->
    <canvas id="matrix"></canvas>
    
    <!-- Main Content -->
    <div class="container">
        <header>
            <h1>AI Task Tracker</h1>
            <p class="subtitle">Your Daily Progress Companion</p>
        </header>
        
        <main>
            <!-- Task Input -->
            <div class="input-section">
                <input type="text" id="taskInput" placeholder="Enter your daily task...">
                <button id="addTaskBtn">Add Task</button>
            </div>
            
            <!-- Tasks List -->
            <div class="tasks-section">
                <h2>Today's Tasks</h2>
                <ul id="tasksList"></ul>
            </div>
            
            <!-- Progress Display -->
            <div class="progress-section">
                <div class="progress-circle">
                    <div class="progress-value" id="progressValue">0%</div>
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__background" cx="60" cy="60" r="50"/>
                        <circle class="progress-ring__indicator" cx="60" cy="60" r="50"/>
                    </svg>
                </div>
                <p id="progressText">Tasks completed today</p>
            </div>
        </main>
        
        <footer>
            <p>Built with • Hermes Agent • Nemotron-3-Super</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
